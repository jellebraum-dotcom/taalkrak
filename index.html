<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Taalkrak</title>
<link rel="stylesheet" href="taalkrak.css">
<link rel="manifest" href="manifest.webmanifest">
<meta name="color-scheme" content="only light">
<meta name="theme-color" content="#FFC233">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Taalkrak">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
</head>
<body>

<!-- ===================== WELKOM ===================== -->
<main class="home" id="screenHome">
  <div class="home__logo home__logo--taal" aria-hidden="true"><span>Aa</span></div>
  <h1 class="home__title">Taalkrak</h1>
  <p class="home__sub">Word een krak in taal!</p>
  <div class="home__cards">
    <button class="bigcard bigcard--self" id="goSelf" type="button">
      <span class="bigcard__ic" aria-hidden="true">✏️</span>
      <span class="bigcard__tx"><b>Zelf oefenen</b><span>Kies je graad en je onderwerpen zelf</span></span>
    </button>
    <button class="bigcard bigcard--scan" id="goScan" type="button">
      <span class="bigcard__ic" aria-hidden="true">📷</span>
      <span class="bigcard__tx"><b>Scan een QR-code van de juf/meester</b><span>Open meteen jouw oefening</span></span>
    </button>
  </div>
</main>

<!-- ===================== SETUP (zelf oefenen) ===================== -->
<main class="setup hidden" id="screenSetup">
  <div class="setup__head">
    <button class="backbtn" id="setupBack" type="button" aria-label="Terug">←</button>
    <h2 class="setup__title">Zelf oefenen</h2>
  </div>
  <section class="panel">
    <div id="settingsHost"></div>
    <button class="btn btn--grass btn--block" id="startSelf" type="button" style="margin-top:6px;font-size:17px;padding:16px">▶ Starten</button>
  </section>
</main>

<!-- ===================== QR-SCANNER ===================== -->
<main class="scan hidden" id="screenScan">
  <video class="scan__video" id="scanVideo" playsinline muted></video>
  <div class="scan__overlay" id="scanOverlay">
    <div class="scan__msg">Richt op de QR-code<br>van de juf/meester</div>
    <div class="scan__frame"><div class="scan__corner2"></div></div>
    <div class="scan__hint" id="scanHint">Houd de code rustig in het kader</div>
  </div>
  <div class="scan__err hidden" id="scanErr">
    <div style="font-size:58px" aria-hidden="true">📷</div>
    <b id="scanErrMsg"></b>
    <span>Vraag de juf of meester om de oefening anders via de link te openen.</span>
  </div>
  <button class="scan__close" id="scanClose" type="button">← Terug</button>
  <canvas id="scanCanvas" class="hidden"></canvas>
</main>

<!-- ===================== SPELER ===================== -->
<main class="play hidden" id="screenPlay">
  <div class="play__top">
    <div class="stars"><span class="s" id="starIcon">★</span><span id="starCount">0</span></div>
    <div class="prog"><div class="prog__fill" id="progFill"></div></div>
    <button class="iconbtn" id="soundBtn" type="button" title="Geluid aan/uit" aria-label="Geluid aan of uit">🔊</button>
    <button class="iconbtn" id="quitBtn" type="button" title="Stoppen" aria-label="Stoppen">✕</button>
  </div>
  <div class="stage" id="stage"></div>
</main>
<main class="play hidden" id="screenDone"><div class="results" id="resultsBox"></div></main>

<div class="splash" id="splash" aria-live="polite">
  <div class="splash__card">
    <div class="splash__emo" id="splashEmo">🎉</div>
    <div class="splash__txt" id="splashTxt">Goed zo!</div>
    <div class="splash__hint" id="splashHint"></div>
  </div>
</div>
<div id="glow"></div>
<canvas id="confetti"></canvas>

<script src="jsqr.js"></script>
<script src="engine.js"></script>
<script>
(function(){
"use strict";
var $=function(s){return document.querySelector(s);};
var SETUP = TK.defaults();

function hideAll(){ ["#screenHome","#screenSetup","#screenScan","#screenPlay","#screenDone"].forEach(function(id){ $(id).classList.add("hidden"); }); }
function showHome(){ hideAll(); document.body.style.background=""; $("#screenHome").classList.remove("hidden"); window.scrollTo(0,0); }
function goHome(){ stopScan(); if(location.hash){ history.replaceState(null,"",location.pathname+location.search); } showHome(); }
function showSetup(){ TK.resumeAudio(); hideAll(); $("#screenSetup").classList.remove("hidden"); window.scrollTo(0,0); }

TK.makeSettings($("#settingsHost"), SETUP, function(){});
TK.setOnExit(goHome);

/* Terugkeer-regels: bij "Zelf oefenen" kan het kind altijd terug naar het
   hoofdmenu; bij een oefening van de juf/meester (QR of link) pas als de
   oefening helemaal is afgerond. Uitzondering: bij een oneindige oefening
   (∞) blijft de knop zichtbaar, anders kan het kind nooit meer stoppen. */
function setQuit(visible){ $("#quitBtn").classList.toggle("hidden", !visible); }
$("#goSelf").onclick=showSetup;
$("#goScan").onclick=startScan;
$("#setupBack").onclick=showHome;
$("#startSelf").onclick=function(){ setQuit(true); TK.startGame(JSON.parse(JSON.stringify(SETUP))); };
$("#scanClose").onclick=goHome;
$("#soundBtn").onclick=function(){ TK.toggleSound(); };
$("#quitBtn").onclick=goHome;

/* ---------- QR-scanner ---------- */
var scanStream=null, scanRAF=null, scanVideo, scanCanvas, scanCtx;
function startScan(){
  TK.resumeAudio(); hideAll(); $("#screenScan").classList.remove("hidden");
  $("#scanErr").classList.add("hidden"); $("#scanOverlay").classList.remove("hidden");
  $("#scanHint").textContent="Houd de code rustig in het kader";
  scanVideo=$("#scanVideo"); scanCanvas=$("#scanCanvas"); scanCtx=scanCanvas.getContext("2d",{willReadFrequently:true});
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || !window.jsQR){ return scanError("Scannen werkt hier niet."); }
  navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:"environment"}},audio:false})
    .then(function(stream){ scanStream=stream; scanVideo.srcObject=stream; scanVideo.setAttribute("playsinline",""); return scanVideo.play(); })
    .then(function(){ scanRAF=requestAnimationFrame(scanLoop); })
    .catch(function(err){
      var msg=(err&&(err.name==="NotAllowedError"||err.name==="SecurityError"))? "Geef toestemming voor de camera om te kunnen scannen." : "De camera kon niet starten.";
      scanError(msg);
    });
}
function scanLoop(){
  if(!scanStream) return;
  if(scanVideo.readyState===scanVideo.HAVE_ENOUGH_DATA){
    var w=scanVideo.videoWidth, h=scanVideo.videoHeight;
    if(w&&h){
      scanCanvas.width=w; scanCanvas.height=h; scanCtx.drawImage(scanVideo,0,0,w,h);
      var img; try{ img=scanCtx.getImageData(0,0,w,h); }catch(e){ img=null; }
      if(img){
        var code=jsQR(img.data,w,h,{inversionAttempts:"dontInvert"});
        if(code && code.data){
          var cfg=TK.parseParams(code.data);
          if(cfg){ cfg.session="self"; if(navigator.vibrate) navigator.vibrate(60); stopScan(); setQuit(cfg.count===0); TK.startGame(cfg); return; }
          else { $("#scanHint").textContent="Dat is geen Taalkrak-code 🤔"; }
        }
      }
    }
  }
  scanRAF=requestAnimationFrame(scanLoop);
}
function stopScan(){
  if(scanRAF){ cancelAnimationFrame(scanRAF); scanRAF=null; }
  if(scanStream){ scanStream.getTracks().forEach(function(t){t.stop();}); scanStream=null; }
  if(scanVideo){ scanVideo.srcObject=null; }
  $("#screenScan").classList.add("hidden");
}
function scanError(msg){ $("#scanErrMsg").textContent=msg; $("#scanOverlay").classList.add("hidden"); $("#scanErr").classList.remove("hidden"); }

/* ---------- service worker ---------- */
if("serviceWorker" in navigator){ window.addEventListener("load",function(){ navigator.serviceWorker.register("sw.js").catch(function(){}); }); }

/* ---------- opstarten ---------- */
var cfg=TK.parseParams(location.hash);
if(cfg){ cfg.session="self"; setQuit(cfg.count===0); TK.startGame(cfg); } else { showHome(); }
})();
</script>
</body>
</html>
